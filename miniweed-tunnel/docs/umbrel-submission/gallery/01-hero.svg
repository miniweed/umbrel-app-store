<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="Menlo, Monaco, 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2620"/>
      <stop offset="1" stop-color="#121814"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9fd1af"/>
      <stop offset="1" stop-color="#5d8d6b"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- icon -->
  <g transform="translate(720,300)">
    <circle cx="0" cy="0" r="92" fill="none" stroke="url(#ring)" stroke-width="26"/>
    <circle cx="0" cy="0" r="40" fill="#0f1512" stroke="#7ead8a" stroke-width="7"/>
    <rect x="-128" y="-12" width="38" height="24" rx="8" fill="#7ead8a"/>
    <rect x="90" y="-12" width="38" height="24" rx="8" fill="#7ead8a"/>
  </g>

  <text x="720" y="500" text-anchor="middle" fill="#eef3ef" font-size="92" font-weight="700" letter-spacing="6">TUNNEL</text>
  <text x="720" y="565" text-anchor="middle" fill="#9fd1af" font-size="34">Expose your Umbrel services to the internet — no router ports</text>
  <text x="720" y="640" text-anchor="middle" fill="#7f8e85" font-size="26">Your own VPS · WireGuard end-to-end encryption · automatic HTTPS</text>
</svg>
