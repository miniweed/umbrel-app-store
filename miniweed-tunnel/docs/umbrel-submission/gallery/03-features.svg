<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="Menlo, Monaco, 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2620"/>
      <stop offset="1" stop-color="#121814"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>

  <text x="720" y="130" text-anchor="middle" fill="#eef3ef" font-size="56" font-weight="700">A self-hosted Cloudflare Tunnel alternative</text>

  <g>
    <!-- card template repeated -->
    <g transform="translate(160,230)">
      <rect width="500" height="180" rx="18" fill="#222d27" stroke="#3a4a40" stroke-width="2"/>
      <text x="40" y="75" fill="#9fd1af" font-size="34" font-weight="700">Your own VPS</text>
      <text x="40" y="120" fill="#cdd6d0" font-size="24">No third party. You control the</text>
      <text x="40" y="150" fill="#cdd6d0" font-size="24">server and the data path.</text>
    </g>
    <g transform="translate(780,230)">
      <rect width="500" height="180" rx="18" fill="#222d27" stroke="#3a4a40" stroke-width="2"/>
      <text x="40" y="75" fill="#9fd1af" font-size="34" font-weight="700">Automatic HTTPS</text>
      <text x="40" y="120" fill="#cdd6d0" font-size="24">Caddy + Let's Encrypt issue</text>
      <text x="40" y="150" fill="#cdd6d0" font-size="24">certificates per service.</text>
    </g>
    <g transform="translate(160,450)">
      <rect width="500" height="180" rx="18" fill="#222d27" stroke="#3a4a40" stroke-width="2"/>
      <text x="40" y="75" fill="#9fd1af" font-size="34" font-weight="700">Works behind CGNAT</text>
      <text x="40" y="120" fill="#cdd6d0" font-size="24">No router port forwarding</text>
      <text x="40" y="150" fill="#cdd6d0" font-size="24">required.</text>
    </g>
    <g transform="translate(780,450)">
      <rect width="500" height="180" rx="18" fill="#222d27" stroke="#3a4a40" stroke-width="2"/>
      <text x="40" y="75" fill="#9fd1af" font-size="34" font-weight="700">Hardened setup</text>
      <text x="40" y="120" fill="#cdd6d0" font-size="24">One verifiable script: firewall,</text>
      <text x="40" y="150" fill="#cdd6d0" font-size="24">SSH hardening, optional CrowdSec.</text>
    </g>
  </g>

  <text x="720" y="730" text-anchor="middle" fill="#7f8e85" font-size="26">WireGuard end-to-end encryption · single VPS · guided in-app instructions</text>
</svg>
