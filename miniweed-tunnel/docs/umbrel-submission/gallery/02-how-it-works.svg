<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" font-family="Menlo, Monaco, 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2620"/>
      <stop offset="1" stop-color="#121814"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>

  <text x="720" y="140" text-anchor="middle" fill="#eef3ef" font-size="56" font-weight="700">How it works</text>

  <!-- three nodes -->
  <g text-anchor="middle">
    <!-- Internet -->
    <rect x="120" y="380" width="300" height="160" rx="20" fill="#222d27" stroke="#3a4a40" stroke-width="2"/>
    <text x="270" y="455" fill="#eef3ef" font-size="34" font-weight="700">Internet</text>
    <text x="270" y="495" fill="#7f8e85" font-size="22">your visitors</text>

    <!-- VPS -->
    <rect x="570" y="380" width="300" height="160" rx="20" fill="#222d27" stroke="#7ead8a" stroke-width="2"/>
    <text x="720" y="450" fill="#eef3ef" font-size="34" font-weight="700">VPS</text>
    <text x="720" y="490" fill="#7f8e85" font-size="22">public IP · Caddy</text>
    <text x="720" y="520" fill="#7f8e85" font-size="22">HTTPS 80/443</text>

    <!-- Umbrel -->
    <rect x="1020" y="380" width="300" height="160" rx="20" fill="#222d27" stroke="#3a4a40" stroke-width="2"/>
    <text x="1170" y="450" fill="#eef3ef" font-size="34" font-weight="700">Umbrel</text>
    <text x="1170" y="490" fill="#7f8e85" font-size="22">your apps</text>
    <text x="1170" y="520" fill="#7f8e85" font-size="22">behind CGNAT</text>
  </g>

  <!-- arrows -->
  <g stroke="#9fd1af" stroke-width="4" fill="none">
    <line x1="420" y1="460" x2="560" y2="460"/>
    <polygon points="560,460 546,452 546,468" fill="#9fd1af" stroke="none"/>
    <line x1="870" y1="460" x2="1010" y2="460"/>
    <polygon points="1010,460 996,452 996,468" fill="#9fd1af" stroke="none"/>
  </g>
  <text x="940" y="430" text-anchor="middle" fill="#9fd1af" font-size="20">WireGuard tunnel</text>

  <text x="720" y="650" text-anchor="middle" fill="#7f8e85" font-size="26">Inbound traffic enters via your VPS and travels an encrypted tunnel to Umbrel.</text>
  <text x="720" y="690" text-anchor="middle" fill="#7f8e85" font-size="26">Your home router never opens a port.</text>
</svg>
