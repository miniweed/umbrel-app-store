services:

  app_proxy:
    environment:
      APP_HOST: miniweed-tunnel_web_1
      APP_PORT: 3016
      PROXY_AUTH_ADD: "true"

  web:
    image: ghcr.io/miniweed/umbrel-tunnel-web:1.3.7@sha256:551223feafb5b5805e4d72c582786eeee6bbb80f6e0c5e9a3a89691923dcd683
    restart: on-failure
    stop_grace_period: 30s
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      - DATA_DIR=/data
      - WG_API_HOST=wg
      - PORT=3016
      - TUNNEL_API_TOKEN=${APP_SEED}

  caddy:
    image: caddy:2.8-alpine@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17
    restart: on-failure
    stop_grace_period: 30s
    network_mode: "service:wg"
    depends_on:
      - wg
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/caddy/data:/data/caddy
      - ${APP_DATA_DIR}/caddy/config:/config
    environment:
      - XDG_DATA_HOME=/data/caddy
    command:
      - sh
      - -c
      - |
        until [ -s /data/Caddyfile ] && [ -f /data/wg-ready ]; do
          echo "[caddy] Waiting for Caddyfile and WireGuard tunnel..."
          sleep 2
        done
        exec caddy run --config /data/Caddyfile --adapter caddyfile --watch

  wg:
    image: ghcr.io/miniweed/umbrel-tunnel-wg:1.0.2@sha256:268d8e365ee1852856d7aa75845c0b700ef905d4c8b46d3b142e64b322cb9430
    restart: on-failure
    stop_grace_period: 30s
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ${APP_DATA_DIR}/data:/data
