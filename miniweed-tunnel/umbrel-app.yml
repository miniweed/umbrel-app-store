manifestVersion: 1
id: miniweed-tunnel
name: Tunnel
tagline: Expón tu servidor al mundo sin tocar el router
category: networking
version: "1.6.31"
icon: https://raw.githubusercontent.com/miniweed/umbrel-app-store/main/miniweed-tunnel/icon.svg
port: 3016
description: >-
  Conecta tu Umbrel a un VPS propio y expón servicios a internet sin abrir puertos
  en tu router. Alternativa 100% self-hosted a Cloudflare Tunnel. Funciona detrás
  de CGNAT. Usa WireGuard para cifrado extremo a extremo y Caddy para HTTPS
  automático con Let's Encrypt.
developer: miniweed
website: https://github.com/miniweed/umbrel-app-store
repo: https://github.com/miniweed/umbrel-app-store
support: https://github.com/miniweed/umbrel-app-store/issues
gallery: []
releaseNotes: >-
  Login propio con contraseña y sesiones. Nueva UI: failover y multi-VPS,
  rotación segura de claves, kill-switch, backup/restore cifrado y gestión de
  claves CLI. Endurecimiento de seguridad (anti-fuerza-bruta, anti-SSRF en
  health checks, validación reforzada) y mayor robustez del backend.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
