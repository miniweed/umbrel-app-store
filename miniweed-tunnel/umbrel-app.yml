manifestVersion: 1
id: miniweed-tunnel
name: Tunnel
tagline: Expose your services to the world without touching your router
category: networking
version: "1.6.42"
icon: https://raw.githubusercontent.com/miniweed/umbrel-app-store/main/miniweed-tunnel/icon.svg
port: 3016
description: >-
  Connect your Umbrel to your own VPS and expose services to the internet without
  opening ports on your router. A 100% self-hosted alternative to Cloudflare Tunnel.
  Works behind CGNAT. Uses WireGuard for end-to-end encryption and Caddy for
  automatic HTTPS with Let's Encrypt.


  The app generates a one-command script that not only sets up the tunnel on your
  VPS but also hardens it: a restrictive firewall (with rollback), SSH hardening
  with lockout protection, and optional CrowdSec. Every script shows a SHA-256 you
  can verify before running it.


  You'll need a small VPS and a domain. Full step-by-step setup guide (renting the
  VPS and the required DNS records, including the wildcard):
  https://github.com/miniweed/umbrel-app-store/blob/main/miniweed-tunnel/README.md
developer: miniweed
website: https://github.com/miniweed/umbrel-app-store
repo: https://github.com/miniweed/umbrel-app-store
support: https://github.com/miniweed/umbrel-app-store/issues
gallery: []
releaseNotes: >-
  Fixes the VPS setup script not being generated: it can now be created with just
  the VPS IP, before the VPS public key is known (regression from a recent
  refactor). Also accepts a trailing slash in service URLs.
dependencies: []
path: ""
defaultUsername: ""
defaultPassword: ""
