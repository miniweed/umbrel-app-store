services:
  app_proxy:
    environment:
      APP_HOST: miniweed-notiann_web_1
      APP_PORT: 3000
      # Rutas públicas: vista compartida, su API/SSE y los estáticos del frontend.
      PROXY_AUTH_WHITELIST: "/s/*,/api/public/*,/uploads/*,/assets/*,/favicon*"

  web:
    image: ghcr.io/miniweed/notiann:1.0.1@sha256:263d82ac4418c0998560e3b6dafe213c956f96a44f037d5b60f5ec116264659a
    restart: on-failure
    stop_grace_period: 15s
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - PORT=3000
      - DATA_DIR=/data
      # Aislamiento frente a otras apps: la app resuelve la IP del app_proxy y
      # detecta peticiones que no pasan por él. En modo "log" solo lo registra
      # (no bloquea); cámbialo a "enforce" cuando los logs confirmen que la IP
      # del proxy se detecta bien.
      - APP_PROXY_HOSTNAME=miniweed-notiann_app_proxy_1
      - PROXY_ONLY_MODE=log
    volumes:
      - ${APP_DATA_DIR}/data:/data
