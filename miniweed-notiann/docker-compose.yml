services:
  app_proxy:
    environment:
      APP_HOST: miniweed-notiann_web_1
      APP_PORT: 3000
      # Rutas públicas: vista compartida, su API/SSE y los estáticos del frontend.
      PROXY_AUTH_WHITELIST: "/s/*,/api/public/*,/assets/*,/favicon*"

  web:
    image: ghcr.io/miniweed/notiann:0.3.0@sha256:a11c24c8c1f3c6b7ba2d8f5d3e21069ffe71855e35f7ce14d8dbd63f234f86d8
    restart: on-failure
    stop_grace_period: 15s
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - PORT=3000
      - DATA_DIR=/data
    volumes:
      - ${APP_DATA_DIR}/data:/data
