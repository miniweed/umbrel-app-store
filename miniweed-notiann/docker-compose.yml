services:
  app_proxy:
    environment:
      APP_HOST: miniweed-notiann_web_1
      APP_PORT: 3000
      # Rutas públicas: vista compartida, su API/SSE y los estáticos del frontend.
      PROXY_AUTH_WHITELIST: "/s/*,/api/public/*,/uploads/*,/assets/*,/favicon*"

  web:
    image: ghcr.io/miniweed/notiann:0.6.0@sha256:89baf823749d77b7703310171c8e33edb209c1740a627f7c594a1ec19736805a
    restart: on-failure
    stop_grace_period: 15s
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - PORT=3000
      - DATA_DIR=/data
    volumes:
      - ${APP_DATA_DIR}/data:/data
