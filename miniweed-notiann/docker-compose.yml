services:
  app_proxy:
    environment:
      APP_HOST: miniweed-notiann_web_1
      APP_PORT: 3000
      # Rutas públicas: vista compartida, su API/SSE y los estáticos del frontend.
      PROXY_AUTH_WHITELIST: "/s/*,/api/public/*,/assets/*,/favicon*"

  web:
    image: ghcr.io/miniweed/notiann:0.2.0@sha256:d43b797b20b7bf2b8744248f2ef56ef63c0024179a6fe3e2ef8edb5e6b43da95
    restart: on-failure
    stop_grace_period: 15s
    user: "1000:1000"
    environment:
      - PORT=3000
      - DATA_DIR=/data
    volumes:
      - ${APP_DATA_DIR}/data:/data
