manifestVersion: 1
id: miniweed-notiann
category: files
name: Notiann
version: "1.0.0"
icon: https://raw.githubusercontent.com/miniweed/umbrel-app-store/main/miniweed-notiann/icon.svg
tagline: Páginas tipo Notion en markdown, compartibles con un link en vivo
description: >-
  Notiann es una app minimalista de notas inspirada en Notion. Crea páginas con
  un editor visual (menú "/" para bloques) que guarda markdown puro, y comparte
  cualquier página con un link público de solo lectura.


  Quien tenga el link ve la página renderizada y recibe tus cambios al instante,
  sin recargar. Los links tienen slug personalizable (/s/mi-pagina) y contraseña
  opcional, y se pueden copiar, rotar y revocar cuando quieras.


  El editor queda protegido por el login de tu Umbrel; solo las páginas que
  compartas explícitamente son públicas. Diseñada para funcionar detrás de un
  reverse proxy o túnel (Cloudflare Tunnel, WireGuard + Caddy, etc.).
releaseNotes: >-
  Versión 1.0 con mejoras grandes:


  - Búsqueda: encuentra cualquier página por su título o contenido desde el
    buscador del menú lateral.

  - Papelera: las páginas borradas se pueden restaurar desde Ajustes (⚙) y se
    eliminan solas pasados 30 días.

  - Dominio público: fija en Ajustes el dominio desde el que expones las páginas
    para copiar links que funcionen desde fuera de casa, no la dirección local.

  - Móvil: la interfaz se adapta a pantallas pequeñas con menú lateral deslizable.

  - Más seguridad y robustez: protección CSRF, aislamiento de la API frente a
    otras apps y guardado con detección de conflictos entre pestañas.
