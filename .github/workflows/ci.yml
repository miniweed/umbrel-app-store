name: ci

on:
  push:
  pull_request:

jobs:
  test-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: miniweed-tunnel/web

      - name: Run tests
        run: npm test
        working-directory: miniweed-tunnel/web

  validate-wg-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Python syntax
        run: python3 -m py_compile miniweed-tunnel/wg-client/wg-api.py

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck entrypoint
        run: docker run --rm -v "$PWD":/mnt koalaman/shellcheck:stable miniweed-tunnel/wg-client/entrypoint.sh
