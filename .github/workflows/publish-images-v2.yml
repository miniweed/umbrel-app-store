name: publish-images-v2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract versions
        id: versions
        run: |
          APP_VERSION=$(sed -n 's/^version: "\([^"]*\)"/\1/p' miniweed-tunnel/umbrel-app.yml | head -n1)
          WG_VERSION=$(sed -n 's/.*umbrel-tunnel-wg:\([^@ ]*\).*/\1/p' miniweed-tunnel/docker-compose.yml | head -n1)
          if [ -z "$APP_VERSION" ]; then
            echo "umbrel-app.yml version not found" >&2
            exit 1
          fi
          if [ -z "$WG_VERSION" ]; then
            echo "wg image version not found in docker-compose.yml" >&2
            exit 1
          fi
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "wg_version=${WG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: miniweed-tunnel/web
          file: miniweed-tunnel/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-web:${{ steps.versions.outputs.app_version }}
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-web:main

      - name: Build and push wg image
        uses: docker/build-push-action@v6
        with:
          context: miniweed-tunnel/wg-client
          file: miniweed-tunnel/wg-client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-wg:${{ steps.versions.outputs.wg_version }}
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-wg:main
