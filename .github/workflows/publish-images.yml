name: publish-images

"on":
  push:
    branches:
      - main
    paths:
      - miniweed-tunnel/web/**
      - miniweed-tunnel/wg-client/**
      - miniweed-tunnel/umbrel-app.yml
      - miniweed-tunnel/docker-compose.yml
      - .github/workflows/publish-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract versions
        id: versions
        run: |
          APP_VERSION=$(sed -n 's/^version: "\([^"]*\)"/\1/p' miniweed-tunnel/umbrel-app.yml | head -n1)
          WG_VERSION=$(sed -n 's/.*umbrel-tunnel-wg:\([^@ ]*\).*/\1/p' miniweed-tunnel/docker-compose.yml | head -n1)
          if [ -z "$APP_VERSION" ]; then
            echo "umbrel-app.yml version not found" >&2
            exit 1
          fi
          if [ -z "$WG_VERSION" ]; then
            echo "wg image version not found in docker-compose.yml" >&2
            exit 1
          fi
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "wg_version=${WG_VERSION}" >> "$GITHUB_OUTPUT"

      # Never re-push an existing version tag: pinned digests in the store
      # composes must not drift. Bump the version to publish new content.
      - name: Determine which images need publishing
        id: needs
        run: |
          check_tag() {
            repo="$1"; tag="$2"
            token=$(curl -s "https://ghcr.io/token?scope=repository:${{ github.repository_owner }}/${repo}:pull" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer $token" \
              -H 'Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json' \
              "https://ghcr.io/v2/${{ github.repository_owner }}/${repo}/manifests/${tag}")
            if [ "$code" = "200" ]; then echo false; else echo true; fi
          }
          web=$(check_tag umbrel-tunnel-web "${{ steps.versions.outputs.app_version }}")
          wg=$(check_tag umbrel-tunnel-wg "${{ steps.versions.outputs.wg_version }}")
          echo "web=$web" >> "$GITHUB_OUTPUT"
          echo "wg=$wg" >> "$GITHUB_OUTPUT"
          echo "publish web: $web (tag ${{ steps.versions.outputs.app_version }}), wg: $wg (tag ${{ steps.versions.outputs.wg_version }})"

      - name: Set up QEMU
        if: steps.needs.outputs.web == 'true' || steps.needs.outputs.wg == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.needs.outputs.web == 'true' || steps.needs.outputs.wg == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.needs.outputs.web == 'true' || steps.needs.outputs.wg == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT != '' && secrets.CR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        if: steps.needs.outputs.web == 'true'
        uses: docker/build-push-action@v6
        with:
          context: miniweed-tunnel/web
          file: miniweed-tunnel/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-web:${{ steps.versions.outputs.app_version }}
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-web:main

      - name: Build and push wg image
        if: steps.needs.outputs.wg == 'true'
        uses: docker/build-push-action@v6
        with:
          context: miniweed-tunnel/wg-client
          file: miniweed-tunnel/wg-client/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-wg:${{ steps.versions.outputs.wg_version }}
            ghcr.io/${{ github.repository_owner }}/umbrel-tunnel-wg:main
